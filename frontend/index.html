<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Parking Dashboard</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="container">

        <nav class="navbar">

            <div class="theme-toggle">
                <button id="darkTheme">🌙</button>
            </div>
            <div class="logo">🚗 Smart Parking Api</div>
            <div class="nav-buttons" id="navButtons">
                <button class="login-btn" onclick="openLogin()">Login</button>
                <button class="signup-btn" onclick="openRegister()">Register</button>
            </div>

        </nav>



        <div class="search-box m-2">
            <input type="text" id="searchBox" placeholder="🔍Search parking...">
        </div>

        <!-- Top Stats -->
        <div class="stats m-3">
            <div class="stat-card">
                <h4>Total Parking Lots</h4>
                <h1 id="TotalParkingSlots"></h1>
            </div>
            <div class="stat-card">
                <h4>Available Spots</h4>
                <h1 id="totalAvailableSlots"></h1>
            </div>
            <div class="stat-card">
                <h4>Total Capacity</h4>
                <h1 id="totalCapacity"></h1>
            </div>
            <div class="stat-card">
                <h4>Occupancy Rate</h4>
                <h1 id="occupancyRate"></h1>
            </div>
        </div>

        <h2 class="title">Parking Lots</h2>

        <!-- Filter Bar -->
        <div class="filter-bar m-2 glass"
            style="padding: 15px; border-radius: 12px; display: flex; align-items: center; gap: 15px; flex-wrap: wrap; background: rgba(255,255,255,0.1); backdrop-filter: blur(10px);">
            <div style="display: flex; align-items: center; gap: 10px;">
                <label for="filterType" style="font-weight: 600;">Filter By:</label>
                <select id="filterType" class="form-select" style="width: auto; border-radius: 8px;">
                    <option value="all">All</option>
                    <option value="km">Distance (KM)</option>
                </select>
            </div>
            <div id="radiusContainer" style="display: none; align-items: center; gap: 10px;">
                <label for="radiusInput" style="font-weight: 600;">Radius:</label>
                <input type="number" id="radiusInput" class="form-control" value="10" min="1"
                    style="width: 80px; border-radius: 8px;">
                <span>KM</span>
            </div>
            <div id="loadingIndicator"
                style="display: none; align-items: center; gap: 10px; color: #6366f1; font-weight: 600;">
                <div class="spinner-border spinner-border-sm" role="status"></div>
                <span>Finding lots...</span>
            </div>
        </div>

        <!-- Parking Cards -->
        <div class="cards">

            <div id="cardsSection"></div>



        </div>
    </div>
    <script type="module" src="js/script.js"></script>
</body>

</html>
