<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel — Smart Parking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="container">
        <nav class="navbar">
            <div class="theme-toggle">
                <button id="darkTheme">🌙</button>
            </div>
            <div class="logo">🚗 Admin Panel</div>
            <div class="nav-buttons" id="navButtons"></div>
        </nav>

        <!-- Stats -->
        <div class="stats m-3">
            <div class="stat-card">
                <h4>Total Lots</h4>
                <h1 id="statLots">-</h1>
            </div>
            <div class="stat-card">
                <h4>Available Spots</h4>
                <h1 id="statAvailable">-</h1>
            </div>
            <div class="stat-card">
                <h4>Total Capacity</h4>
                <h1 id="statCapacity">-</h1>
            </div>
            <div class="stat-card">
                <h4>Occupancy Rate</h4>
                <h1 id="statOccupancy">-</h1>
            </div>
        </div>

        <!-- Add / Edit Parking Lot Form -->
        <div class="form-box" id="lotFormBox" style="margin-top:30px;width:100%;max-width:100%;">
            <h2 id="formTitle">➕ Add Parking Lot</h2>
            <div id="formStatus"
                style="display:none;text-align:center;padding:10px;border-radius:8px;margin-bottom:12px;"></div>
            <form id="lotForm">
                <input type="hidden" id="editId">
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:15px;">
                    <div>
                        <label for="placeName">Place Name</label>
                        <input type="text" id="placeName" required placeholder="e.g. Dublin Central Parking">
                    </div>
                    <div>
                        <label for="location">Location</label>
                        <input type="text" id="location" required placeholder="e.g. 📍12 Main Street, Dublin">
                    </div>
                    <div>
                        <label for="mapLink">Google Maps Link</label>
                        <input type="url" id="mapLink" required placeholder="https://maps.google.com/...">
                    </div>
                    <div>
                        <label for="hourlyRate">Hourly Rate</label>
                        <input type="text" id="hourlyRate" required placeholder="e.g. €3.5">
                    </div>
                    <div>
                        <label for="totalCapacity">Total Capacity</label>
                        <input type="number" id="totalCapacity" required min="1" placeholder="e.g. 100">
                    </div>
                    <div>
                        <label for="available">Available Spots</label>
                        <input type="number" id="available" required min="0" placeholder="e.g. 50">
                    </div>
                    <div>
                        <label for="lat">Latitude</label>
                        <input type="number" id="lat" step="any" required placeholder="e.g. 53.3498">
                    </div>
                    <div>
                        <label for="long">Longitude</label>
                        <input type="number" id="long" step="any" required placeholder="e.g. -6.2603">
                    </div>
                </div>
                <div class="btn-group" style="margin-top:20px;">
                    <button type="button" class="btn qr" id="cancelBtn" style="display:none;"
                        onclick="cancelEdit()">Cancel</button>
                    <button type="submit" class="btn predict" id="submitBtn">Add Parking Lot</button>
                </div>
            </form>
        </div>

        <!-- Parking Lots Table -->
        <h2 class="title" style="margin-top:40px;">🅿️ Manage Parking Lots</h2>
        <div id="lotsTableContainer" style="overflow-x:auto;"></div>

        <!-- Vehicles Table -->
        <h2 class="title" style="margin-top:40px;">🚘 All Registered Vehicles</h2>
        <div id="vehiclesTableContainer" style="overflow-x:auto;"></div>
    </div>

    <script type="module" src="js/admin.js"></script>
</body>

</html>
