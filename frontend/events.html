<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nearby Events — Smart Parking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .event-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }
        .event-card:hover {
            transform: translateY(-5px);
        }
        .event-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .crowd-meter {
            height: 10px;
            background: #e2e8f0;
            border-radius: 5px;
            overflow: hidden;
            margin-top: 10px;
        }
        .crowd-fill {
            height: 100%;
            transition: width 0.5s ease;
        }
        .dark .event-card {
            background: #1e293b;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <nav class="navbar">
            <div class="theme-toggle">
                <button id="darkTheme">🌙</button>
            </div>
            <div class="logo">🎉 Nearby Events</div>
            <div class="nav-buttons" id="navButtons">
                <button class="login-btn" onclick="window.location.href='index.html'">Dashboard</button>
            </div>
        </nav>

        <header class="m-3">
            <h2>Upcoming Events Near You</h2>
            <p class="text-muted" id="locationStatus">Getting your location...</p>
        </header>

        <div id="eventsContainer" class="m-3">
            <div class="text-center p-5" id="loadingEvents">
                <div class="spinner-border text-primary" role="status"></div>
                <p class="mt-2">Finding local events...</p>
            </div>
        </div>
    </div>

    <script type="module" src="js/events.js"></script>
</body>
</html>
