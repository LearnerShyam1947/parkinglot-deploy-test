<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Smart Parking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <nav class="navbar p-3">
        <div class="logo form_navabar">🚗 Smart Parking Api</div>
    </nav>

    <div class="form-box" id="loginBox">
        <h2>🔐 Login</h2>
        <div id="statusMsg" style="display:none;text-align:center;padding:10px;border-radius:8px;margin-bottom:12px;">
        </div>
        <form id="loginForm">
            <label for="email">Email</label>
            <input type="email" id="email" required placeholder="Enter your email">

            <label for="password">Password</label>
            <input type="password" id="password" required placeholder="Enter your password">

            <div class="btn-group">
                <button type="button" class="btn qr" onclick="window.location.href='index.html'">Back</button>
                <button type="submit" class="btn predict">Login</button>
            </div>
        </form>
        <p style="text-align:center;margin-top:15px;color:#64748b;">
            Don't have an account? <a href="register.html" style="color:#6366f1;font-weight:600;">Register</a>
        </p>
    </div>

    <script type="module" src="js/login.js"></script>
</body>

</html>
